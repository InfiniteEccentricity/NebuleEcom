<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Products | Nebula Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="sidebar">
        <a th:href="@{/}" class="logo-admin">NEBULA<span style="color: white; font-size: 0.8rem; vertical-align: super;">ADM</span></a>
        
        <a th:href="@{/admin}" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i> Dashboard
        </a>
        <a th:href="@{/admin/products}" class="nav-item active">
            <i class="fa-solid fa-box"></i> Products
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-users"></i> Customers
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-receipt"></i> Orders
        </a>
        
        <div style="margin-top: auto;">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-item" style="background: none; border: none; width: 100%; cursor: pointer; font-family: inherit;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div>
                <h1 style="font-size: 1.8rem; font-weight: 800;">Catalog Management</h1>
                <p style="color: var(--text-muted);">View, edit, or remove items from your store inventory.</p>
            </div>
            <a th:href="@{/admin/products/add}" class="btn btn-primary">
                <i class="fa-solid fa-plus"></i> Add New Product
            </a>
        </header>

        <div class="data-card">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Rating</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td>
                            <div style="display: flex; align-items: center; gap: 15px;">
                                <img th:src="${product.imageUrl}" class="product-img" alt="">
                                <div>
                                    <div style="font-weight: 600;" th:text="${product.name}">Product Name</div>
                                    <div style="font-size: 0.8rem; color: var(--text-muted);" th:text="'ID: #' + ${product.id}">#123</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span class="badge" th:text="${product.category}">Category</span>
                        </td>
                        <td style="font-weight: 600;" th:text="'₹' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">₹0.00</td>
                        <td>
                            <span style="color: #fbbf24;"><i class="fa-solid fa-star"></i> <span th:text="${product.rating}" style="color: var(--text-main);">0.0</span></span>
                        </td>
                        <td>
                            <div style="display: flex; gap: 10px;">
                                <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm" style="background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border);">
                                    <i class="fa-solid fa-pen"></i> Edit
                                </a>
                                <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure you want to delete this product?')">
                                    <i class="fa-solid fa-trash"></i> Delete
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
