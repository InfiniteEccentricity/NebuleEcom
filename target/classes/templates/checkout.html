<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Nebula</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="glass">
        <a th:href="@{/}" class="logo">NEBULA</a>
    </nav>

    <main class="container">
        <div class="cart-grid">
            <div class="checkout-form">
                <h2 style="margin-bottom: 30px; font-weight: 800;">Shipping Details</h2>
                <form th:action="@{/checkout/pay}" method="post">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="form-input" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-input" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" class="form-input" placeholder="123 Nebula Lane" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" class="form-input" placeholder="Bangalore" required>
                        </div>
                        <div class="form-group">
                            <label>State</label>
                            <input type="text" class="form-input" placeholder="Karnataka" required>
                        </div>
                        <div class="form-group">
                            <label>Zip</label>
                            <input type="text" class="form-input" placeholder="560001" required>
                        </div>
                    </div>

                    <h2 style="margin: 40px 0 30px; font-weight: 800;">Payment Method <span style="font-size: 0.9rem; font-weight: 400; color: var(--text-muted);">(Mock)</span></h2>
                    <div style="background: var(--surface); border: 2px solid var(--primary); padding: 20px; border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;">
                        <i class="fa-solid fa-credit-card" style="font-size: 1.5rem; color: var(--primary);"></i>
                        <div>
                            <div style="font-weight: 700;">Credit / Debit Card</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">Secure payment powered by NebulaPay</div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" class="form-input" placeholder="4242 4242 4242 4242" required>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" class="form-input" placeholder="MM / YY" required>
                        </div>
                        <div class="form-group">
                            <label>CVC</label>
                            <input type="text" class="form-input" placeholder="***" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; font-size: 1.1rem; padding: 18px;">Pay <span th:text="'₹' + ${#numbers.formatDecimal(total * 1.18, 0, 'COMMA', 0, 'POINT')}">₹0</span></button>
                </form>
            </div>

            <div class="cart-summary">
                <h3 style="margin-bottom: 20px;">Order Review</h3>
                <div class="summary-row">
                    <span>Order Total</span>
                    <span th:text="'₹' + ${#numbers.formatDecimal(total * 1.18, 0, 'COMMA', 0, 'POINT')}">₹0</span>
                </div>
                <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px;">
                    By clicking "Pay", you agree to our Terms of Service and Privacy Policy. All mock transactions are processed for demonstration purposes.
                </p>
            </div>
        </div>
    </main>
</body>
</html>
