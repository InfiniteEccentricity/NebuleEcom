<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Nebula</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background: var(--background);">
    <div class="auth-container">
        <a th:href="@{/}" class="logo" style="display: block; text-align: center; margin-bottom: 20px;">NEBULA</a>
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Login to your account to continue shopping.</p>
        
        <div th:if="${param.error}" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.9rem;">
            Invalid username or password.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>
        
        <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; text-align: center;">
            <p style="margin-bottom: 15px; font-size: 0.9rem; color: var(--text-muted);">In a hurry?</p>
            <a th:href="@{/checkout}" class="btn" style="width: 100%; border: 1px solid var(--primary); color: var(--primary);">Checkout as Guest</a>
        </div>
    </div>
</body>
</html>
