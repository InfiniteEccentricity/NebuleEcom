<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Nebula</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="glass">
        <a th:href="@{/}" class="logo">NEBULA</a>
        <div class="nav-actions">
            <a th:href="@{/}" class="nav-link">Home</a>
            <a th:href="@{/account}" class="nav-link" style="color: var(--primary);"><i class="fa-solid fa-user"></i> Account</a>
            <a th:href="@{/cart}" class="nav-link cart-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" th:text="${cartCount}">0</span>
            </a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="nav-link" style="background: none; border: none; cursor: pointer; font-family: inherit;">Logout</button>
            </form>
        </div>
    </nav>

    <main class="container">
        <div class="cart-grid">
            <div>
                <h1 style="font-size: 2.5rem; margin-bottom: 10px; font-weight: 800;">My Profile</h1>
                <p style="color: var(--text-muted); margin-bottom: 40px;">Manage your personal information and security settings.</p>

                <div th:if="${param.success}" style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 15px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(16, 185, 129, 0.2);">
                    <i class="fa-solid fa-circle-check"></i> Profile updated successfully.
                </div>

                <div class="auth-container" style="margin: 0; max-width: 100%; text-align: left;">
                    <form th:action="@{/account/update}" method="post">
                        <div class="form-group">
                            <label>Username (Read-only)</label>
                            <input type="text" class="form-input" th:value="${user.username}" readonly style="background: var(--background); opacity: 0.7; cursor: not-allowed;">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" class="form-input" th:value="${user.email}" required>
                        </div>
                        <div style="border-top: 1px solid var(--border); margin: 30px 0; padding-top: 20px;">
                            <h3 style="margin-bottom: 15px;">Change Password</h3>
                            <div class="form-group">
                                <label for="newPassword">New Password (leave blank to keep current)</label>
                                <input type="password" id="newPassword" name="newPassword" class="form-input" placeholder="Enter new password">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: auto; padding: 12px 30px;">Save Changes</button>
                    </form>
                </div>
            </div>

            <div class="cart-summary">
                <h2 style="margin-bottom: 25px;">Account Overview</h2>
                <div style="display: flex; gap: 20px; flex-direction: column;">
                    <div style="background: var(--background); padding: 15px; border-radius: 12px;">
                        <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Member Since</div>
                        <div style="font-weight: 700; margin-top: 5px;">April 2026</div>
                    </div>
                    <div style="background: var(--background); padding: 15px; border-radius: 12px;">
                        <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Recent Orders</div>
                        <div style="margin-top: 10px; font-size: 0.9rem;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="color: var(--primary); font-weight: 600;">#NEB-948271</span>
                                <span style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem;">Shipped</span>
                            </div>
                            <div style="color: var(--text-muted); font-size: 0.8rem;">Placed on April 9, 2026</div>
                        </div>
                    </div>
                </div>
                <div style="margin-top: 30px; font-size: 0.85rem; color: var(--text-muted); text-align: center;">
                    <p>Secured with Nebula Zero-Trust™</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
