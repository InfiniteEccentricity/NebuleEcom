<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Nebula</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="background: var(--background);">
    <div class="container success-container">
        <div class="auth-container" style="max-width: 600px;">
            <i class="fa-solid fa-circle-check success-icon"></i>
            <h1 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Order Confirmed!</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem; margin-bottom: 30px;">Thank you for shopping with Nebula. Your order has been placed successfully and is being processed.</p>
            
            <div style="background: var(--background); border: 1px solid var(--border); padding: 20px; border-radius: 16px; text-align: left; margin-bottom: 30px;">
                <div style="font-weight: 700; margin-bottom: 10px;">Order Number: #NEB-948271</div>
                <div style="font-size: 0.9rem; color: var(--text-muted);">A confirmation email has been sent to your registered address.</div>
            </div>

            <div style="display: flex; gap: 15px; justify-content: center;">
                <a th:href="@{/}" class="btn btn-primary">Continue Shopping</a>
                <a href="#" class="btn" style="border: 1px solid var(--border);">Track Order</a>
            </div>
        </div>
    </div>
</body>
</html>
