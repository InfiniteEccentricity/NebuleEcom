<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id == null ? 'Add Product' : 'Edit Product'} + ' | Nebula Admin'">Add Product | Nebula Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="sidebar">
        <a th:href="@{/}" class="logo-admin">NEBULA<span style="color: white; font-size: 0.8rem; vertical-align: super;">ADM</span></a>
        
        <a th:href="@{/admin}" class="nav-item">
            <i class="fa-solid fa-chart-pie"></i> Dashboard
        </a>
        <a th:href="@{/admin/products}" class="nav-item active">
            <i class="fa-solid fa-box"></i> Products
        </a>
        <a th:href="@{/admin/customers}" class="nav-item">
            <i class="fa-solid fa-users"></i> Customers
        </a>
        <a th:href="@{/admin/orders}" class="nav-item">
            <i class="fa-solid fa-receipt"></i> Orders
        </a>
        
        <div style="margin-top: auto;">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-item" style="background: none; border: none; width: 100%; cursor: pointer; font-family: inherit;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div>
                <h1 style="font-size: 1.8rem; font-weight: 800;" th:text="${product.id == null ? 'New Product' : 'Edit Product'}">New Product</h1>
                <p style="color: var(--text-muted);">Fill in the details below to update your store catalog.</p>
            </div>
            <a th:href="@{/admin/products}" class="btn" style="background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--border);">
                Cancel
            </a>
        </header>

        <div class="data-card" style="max-width: 800px; padding: 40px;">
            <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" th:field="*{name}" class="form-input" placeholder="e.g. Nebula Pro Max" required>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Category</label>
                        <select name="categoryId" class="form-input" style="appearance: none;">
                            <option th:each="category : ${categories}"
                                    th:value="${category.id}"
                                    th:text="${category.name}"
                                    th:selected="${product.category != null && product.category.id == category.id}">
                                Category
                            </option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" step="0.01" th:field="*{price}" class="form-input" placeholder="0.00" required>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Initial Rating (0-5)</label>
                        <input type="number" step="0.1" th:field="*{rating}" class="form-input" placeholder="4.5" required>
                    </div>
                    <div class="form-group">
                        <label>Image Path</label>
                        <input type="text" th:field="*{imageUrl}" class="form-input" placeholder="/images/product.png" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Product Description</label>
                    <textarea th:field="*{description}" class="form-input" rows="5" placeholder="Detailed description of the product features..." required style="resize: vertical;"></textarea>
                </div>

                <div style="display: flex; gap: 15px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary" style="padding: 15px 40px;">
                        <i class="fa-solid fa-save"></i> Save Product
                    </button>
                    <a th:href="@{/admin/products}" class="btn" style="padding: 15px 30px; border: 1px solid var(--border); color: var(--text-muted);">Discard Changes</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
