<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Nebula</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="sidebar">
        <a th:href="@{/}" class="logo-admin">NEBULA<span style="color: white; font-size: 0.8rem; vertical-align: super;">ADM</span></a>
        
        <a th:href="@{/admin}" class="nav-item active">
            <i class="fa-solid fa-chart-pie"></i> Dashboard
        </a>
        <a th:href="@{/admin/products}" class="nav-item">
            <i class="fa-solid fa-box"></i> Products
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-users"></i> Customers
        </a>
        <a href="#" class="nav-item">
            <i class="fa-solid fa-receipt"></i> Orders
        </a>
        
        <div style="margin-top: auto;">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="nav-item" style="background: none; border: none; width: 100%; cursor: pointer; font-family: inherit;">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </form>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div>
                <h1 style="font-size: 1.8rem; font-weight: 800;">Management Overview</h1>
                <p style="color: var(--text-muted);">Welcome back, Admin. Here's what's happening today.</p>
            </div>
            <div style="display: flex; gap: 15px;">
                <a th:href="@{/admin/products/add}" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> New Product
                </a>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Inventory</div>
                <div class="stat-value" th:text="${totalProducts}">0</div>
                <div style="color: var(--success); font-size: 0.85rem; font-weight: 600;">
                    <i class="fa-solid fa-arrow-up"></i> 12% increase
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Active Categories</div>
                <div class="stat-value" th:text="${categories.size()}">0</div>
                <div style="color: var(--text-muted); font-size: 0.85rem;">Diverse catalog</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stock Status</div>
                <div class="stat-value">94%</div>
                <div style="color: var(--success); font-size: 0.85rem; font-weight: 600;">Healthy</div>
            </div>
        </div>

        <h2 style="margin-bottom: 25px;">Catalog Distribution</h2>
        <div class="stats-grid">
            <div th:each="entry : ${categories}" class="stat-card" style="padding: 20px;">
                <div class="stat-label" th:text="${entry.key}">Category</div>
                <div class="stat-value" style="font-size: 1.5rem;" th:text="${entry.value}">0</div>
                <p style="font-size: 0.8rem; color: var(--text-muted);">Items in stock</p>
            </div>
        </div>
    </div>
</body>
</html>
